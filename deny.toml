# cargo-deny configuration — supply-chain gate run in CI.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any security advisory or unmaintained/yanked crate.
version = 2
yanked = "deny"
ignore = [
    # proc-macro-error2 is unmaintained (build-time only), pulled transitively
    # through sea-orm-macros -> sea-bae. Not a vulnerability, and the advisory
    # states no safe upgrade exists; we cannot drop it until sea-orm migrates
    # off it upstream. Revisit when bumping sea-orm.
    { id = "RUSTSEC-2026-0173", reason = "transitive, build-time, no fix available upstream (sea-orm)" },
]

[licenses]
version = 2
# Permissive licenses acceptable for an MIT-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots (via sqlx -> rustls) ships the Mozilla CA bundle under the
    # Community Data License Agreement – Permissive 2.0, a permissive license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Surface accidental duplicate dependency versions without failing the build.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
