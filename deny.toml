# cargo-deny configuration — supply-chain gate run in CI.
# See https://embarkstudios.github.io/cargo-deny/

[advisories]
# Fail on any security advisory or unmaintained/yanked crate.
version = 2
yanked = "deny"

[licenses]
version = 2
# Permissive licenses acceptable for an MIT-licensed project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Zlib",
    # webpki-roots (via sqlx -> rustls) ships the Mozilla CA bundle under the
    # Community Data License Agreement – Permissive 2.0, a permissive license.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
# Surface accidental duplicate dependency versions without failing the build.
multiple-versions = "warn"
wildcards = "deny"

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
