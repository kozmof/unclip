name: CI

on:
  push:
    branches: [main]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  check:
    name: fmt + clippy + test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        # Channel and components are read from rust-toolchain.toml (single source
        # of truth shared with local builds); this action also caches the build.
        uses: actions-rust-lang/setup-rust-toolchain@v1

      - name: Format
        run: cargo fmt --all --check

      - name: Clippy
        # Deny warnings on workspace crates only; --no-deps avoids treating
        # dependency build-script warnings as hard errors.
        run: cargo clippy --workspace --all-targets --no-deps -- -D warnings

      - name: Test
        run: cargo test --workspace

  audit:
    name: cargo-deny (advisories + bans + sources)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: EmbarkStudios/cargo-deny-action@v2
        with:
          # `licenses` is configured in deny.toml but left out of the CI gate
          # until the allow-list is validated against the full tree
          # (`cargo deny check licenses` locally).
          command: check advisories bans sources
